<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Trái Đất VR - Three.js</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <h1>🌍 Earth VR - Realistic Edition</h1>
        <p id="mode">🎨 Enhanced: 3-Point Lighting, Atmospheric Glow</p>
        <p>🖱️ Drag: Xoay quanh | 🔄 Scroll: Phóng vào/ra</p>
        <p><strong>R</strong>: Reset | <strong>F</strong>: Toggle Info</p>
        <p id="fps">FPS: 0</p>
    </div>
    
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Configuration -->
    <script src="config.js"></script>
    <!-- Main Application -->
    <script src="earth-vr.js"></script>
</body>
</html>
